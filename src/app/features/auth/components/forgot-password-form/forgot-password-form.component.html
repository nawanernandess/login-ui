<button mat-icon-button class="back-btn" routerLink="/" title="Voltar">
  <mat-icon>arrow_back</mat-icon>
</button>

<div class="form-brand">Metanoia</div>
<h2 class="form-title">Recuperar senha.</h2>
<p class="form-subtitle">Informe seu e-mail para receber as instruções de redefinição.</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="field-group">
    <label class="field-label">Seu e-mail</label>
    <mat-form-field appearance="outline" class="full-width">
      <input matInput formControlName="email" placeholder="seu@email.com" />
      @if (form.get('email')?.touched && form.get('email')?.hasError('required')) {
        <mat-error>E-mail é obrigatório</mat-error>
      } @else if (form.get('email')?.touched && form.get('email')?.hasError('email')) {
        <mat-error>Informe um e-mail válido</mat-error>
      }
    </mat-form-field>
  </div>

  <button mat-flat-button type="submit" class="submit-btn">
    Enviar
  </button>
</form>
